<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>InterviewAI</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages Routing Fallback
      // This script reads the requested pathname and redirects to index.html with the path in a query parameter.
      var pathSegmentsToKeep = 1; // Change to 0 if deploying to a custom domain on GitHub Pages

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
